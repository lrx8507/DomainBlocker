name: Build DomainBlocker Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      # === 修复：添加 Homebrew 路径到 PATH ===
      - name: Set up Homebrew PATH
        run: |
          echo "PATH=/opt/homebrew/bin:/usr/local/bin:$PATH" >> $GITHUB_ENV
          echo "Homebrew PATH set to: $PATH"
      
      # === 安装 ldid ===
      - name: Install ldid
        run: |
          brew install ldid
          ldid -v
          echo "ldid version: $(ldid -v)"
      
      # === 安装 Theos ===
      - name: Set up Theos
        run: |
          brew install theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          theos --version
      
      # === 构建 DomainBlocker ===
      - name: Build Tweak
        run: |
          cd DomainBlocker
          make package FINALPACKAGE=1
          ls -l *.deb
          mv *.deb domainblocker.deb
          echo "DEB_FILE=domainblocker.deb" >> $GITHUB_ENV
      
      # === 上传构建产物 ===
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: DomainBlocker
          path: DomainBlocker/*.deb
