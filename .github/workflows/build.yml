name: Build DomainBlocker Tweak

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install ldid
          brew install xz
          echo "ldid path: $(which ldid)"
      
      - name: Setup Theos
        run: |
          # 1. 安装 Theos (使用 git clone)
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          
          # 2. 创建并配置 ~/.theos/rc.mk (关键修复！)
          mkdir -p ~/.theos
          echo "NO_SIGNING = 1" > ~/.theos/rc.mk
          echo "THEOS_IGNORE_PARALLEL_BUILDING_NOTICE = yes" >> ~/.theos/rc.mk
          
          # 3. 验证 rc.mk 内容
          cat ~/.theos/rc.mk
          
          # 4. 设置 SDK
          rm -rf $HOME/theos/sdks
          git clone https://github.com/xybp888/iOS-SDKs $HOME/theos/sdks
          cd $HOME/theos/sdks
          find . -maxdepth 1 -type d -name "iPhoneOS*" ! -name "iPhoneOS14.5.sdk" -exec rm -rf {} +
          ln -s iPhoneOS14.5.sdk iPhoneOS.sdk
      
      - name: Build Tweak
        run: |
          cd DomainBlocker
          make package FINALPACKAGE=1 DEBUG=0
          ls -l *.deb
          mv *.deb domainblocker.deb
          echo "DEB_FILE=domainblocker.deb" >> $GITHUB_ENV
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DomainBlocker
          path: DomainBlocker/*.deb
