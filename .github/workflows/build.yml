name: Build DomainBlocker Tweak

on:
  workflow_dispatch:  # 仅手动触发（不再自动运行）

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # === 修复：正确设置 Homebrew 路径 ===
      - name: Set up Homebrew PATH
        run: |
          echo "PATH=/opt/homebrew/bin:/usr/local/bin:$PATH" >> $GITHUB_ENV
          echo "PATH after setup: $PATH"
          which ldid || echo "ldid not found (will install now)"
      
      # === 安装 ldid（关键修复：移除错误的 ldid -v 调用）===
      - name: Install ldid
        run: |
          brew install ldid
          which ldid  # 确认路径
          echo "ldid installed successfully at $(which ldid)"
      
      # === 安装 Theos ===
      - name: Set up Theos
        run: |
          brew install theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          which ldid  # 确认 ldid 在 PATH 中
          theos --version
      
      # === 构建 DomainBlocker ===
      - name: Build Tweak
        run: |
          cd DomainBlocker
          make package FINALPACKAGE=1
          ls -l *.deb
          mv *.deb domainblocker.deb
          echo "DEB_FILE=domainblocker.deb" >> $GITHUB_ENV
      
      # === 上传构建产物（v4 版本）===
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DomainBlocker
          path: DomainBlocker/*.deb
