name: Build DomainBlocker Tweak

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # === 修复：添加 Theos Homebrew 仓库 ===
      - name: Add Theos Homebrew tap
        run: |
          brew tap theos/theos
          echo "Theos tap added successfully"
      
      # === 修复：正确安装 ldid 和 Theos ===
      - name: Install ldid and Theos
        run: |
          # 安装 ldid（已安装，但需要验证路径）
          brew install ldid
          which ldid
          echo "ldid installed at $(which ldid)"
          
          # 安装 Theos（关键修复：使用正确的 tap）
          brew install theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          which ldid  # 确认 ldid 在 PATH 中
          theos --version
      
      # === 构建 DomainBlocker ===
      - name: Build Tweak
        run: |
          cd DomainBlocker
          make package FINALPACKAGE=1
          ls -l *.deb
          mv *.deb domainblocker.deb
          echo "DEB_FILE=domainblocker.deb" >> $GITHUB_ENV
      
      # === 上传构建产物（v4 版本）===
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DomainBlocker
          path: DomainBlocker/*.deb
